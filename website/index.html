  <style>
    body {
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/images/background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: brightness(0.78) saturate(0.85);
      z-index: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(37, 150, 190, 0.10) 0%,
        rgba(22, 58, 100, 0.28) 50%,
        rgba(10, 22, 42, 0.68) 100%
      );
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.4rem;
    }

    .band-name {
      font-family: 'BiroScript', cursive;
      font-size: clamp(1.6rem, 5vw, 4rem);
      font-weight: normal;
      letter-spacing: 0.08em;
      color: var(--sky-light);
      text-shadow: 0 2px 40px rgba(37, 150, 190, 0.22), 0 1px 12px rgba(10, 22, 42, 0.5);
      user-select: none;
    }

    .socials {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sky-light);
      opacity: 0.65;
      transition: opacity 0.22s ease, color 0.22s ease, transform 0.22s ease;
      text-decoration: none;
    }

    .socials a:hover {
      opacity: 1;
      color: var(--sky-bright);
      transform: translateY(-2px);
    }

    .socials svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    /* Upcoming Release */
    .upcoming-release {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 2rem 4rem;
      background: var(--night);
    }

    .upcoming-release h2 {
      font-family: Georgia, serif;
      font-size: 0.72rem;
      font-weight: normal;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sky-mid);
      margin-bottom: 2.5rem;
    }

    .release-card {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      max-width: 640px;
    }

    .release-card img {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    .release-info {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .release-info .release-title {
      font-family: Georgia, serif;
      font-size: 1.3rem;
      font-style: italic;
      color: var(--sky-light);
    }

    .release-info .release-date {
      font-family: Georgia, serif;
      font-size: 0.95rem;
      color: var(--sky-mid);
      letter-spacing: 0.04em;
    }

    @media (max-width: 600px) {
      .release-card {
        flex-direction: column;
        text-align: center;
      }

      .release-card img {
        width: 200px;
        height: 200px;
      }
    }
  </style>
</head>
