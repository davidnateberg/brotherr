<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BROTHERR</title>
  <style>
    @font-face {
      font-family: 'BiroScript';
      src: url('assets/fonts/Biro_Script_reduced.otf') format('opentype'),
           url('assets/fonts/Biro_Script_reduced.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background: #0e1a26;
      color: #ccd6dd;
      overflow: hidden;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 1.4rem 2rem;
    }

    .nav a {
      font-family: Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #5274a1;
      opacity: 1;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .nav a:hover,
    .nav a.active {
      opacity: 1;
    }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/images/background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: brightness(0.78) saturate(0.85);
      z-index: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(37, 150, 190, 0.10) 0%,
        rgba(22, 58, 100, 0.28) 50%,
        rgba(10, 22, 42, 0.68) 100%
      );
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.4rem;
    }

    .band-name {
      font-family: 'BiroScript', cursive;
      font-size: clamp(1.6rem, 5vw, 4rem);
      font-weight: normal;
      letter-spacing: 0.08em;
      color: #ccd6dd;
      text-shadow: 0 2px 40px rgba(37, 150, 190, 0.22), 0 1px 12px rgba(10, 22, 42, 0.5);
      user-select: none;
    }

    .socials {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccd6dd;
      opacity: 0.65;
      transition: opacity 0.22s ease, color 0.22s ease, transform 0.22s ease;
      text-decoration: none;
    }

    .socials a:hover {
      opacity: 1;
      color: #2596be;
      transform: translateY(-2px);
    }

    .socials svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <nav class="nav" aria-label="Main navigation">
    <a href="index.html" class="active">Home</a>
    <a href="bio.html">Bio</a>
