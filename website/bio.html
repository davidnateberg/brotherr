<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio — BROTHERR</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    .page {
      gap: 4rem;
    }

    .bio-card {
      display: flex;
      align-items: flex-start;
      gap: 3.5rem;
      max-width: 900px;
      width: 100%;
    }

    .bio-photo {
      flex: 0 0 340px;
      height: 480px;
      object-fit: cover;
      object-position: center top;
      filter: brightness(0.9) saturate(0.85);
    }

    .bio-right {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .page-label {
      font-size: clamp(1rem, 2.5vw, 1.8rem);
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--sky-mid);
      margin-bottom: 0.8rem;
    }

    .bio-text {
      font-size: 1rem;
      font-weight: bold;
      line-height: 1.9;
      color: var(--sky-light);
      opacity: 0.75;
    }

    /* Mobile: stack vertically */
    @media (max-width: 600px) {
      .bio-card {
        flex-direction: column;
        gap: 2rem;
      }

      .bio-photo {
        flex: none;
        width: 100%;
        height: 280px;
        object-position: center 20%;
      }
    }
  </style>
</head>
<body>

  <nav class="nav" aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="bio.html" class="active">Bio</a>
    <a href="https://ffm.bio/brotherr" target="_blank" rel="noopener">Listen</a>
    <a href="tour.html">Tour</a>
  </nav>

  <main class="page">
    <div class="bio-card">
      <img class="bio-photo" src="assets/images/david.jpg" alt="David Berg recording in his studio" />
      <div class="bio-right">
        <h1 class="page-label">Bio</h1>
        <p class="bio-text" id="bio-text"></p>
      </div>
    </div>
  </main>

  <script src="content/bio.js"></script>
</body>
</html>
