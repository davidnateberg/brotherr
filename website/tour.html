<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tour — BROTHERR</title>
  <style>
    @font-face {
      font-family: 'BiroScript';
      src: url('assets/fonts/Biro_Script_reduced.otf') format('opentype'),
           url('assets/fonts/Biro_Script_reduced.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background: #0e1a26;
      color: #ccd6dd;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 1.4rem 2rem;
    }

    .nav a {
      font-family: Georgia, serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #5274a1;
      opacity: 1;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .nav a:hover,
    .nav a.active {
      opacity: 1;
    }

    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .page-label {
      font-family: 'BiroScript', cursive;
      font-size: clamp(1.6rem, 5vw, 4rem);
      font-weight: normal;
      letter-spacing: 0.08em;
      color: #ccd6dd;
      text-shadow: 0 2px 40px rgba(37, 150, 190, 0.22), 0 1px 12px rgba(10, 22, 42, 0.5);
      margin-bottom: 2rem;
    }

    .no-shows {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ccd6dd;
      opacity: 0.45;
    }
  </style>
</head>
<body>

  <nav class="nav" aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="bio.html">Bio</a>
    <a href="tour.html" class="active">Tour</a>
  </nav>

  <main class="page">
    <h1 class="page-label">Tour</h1>
    <p class="no-shows">No upcoming shows</p>
  </main>

</body>
</html>
